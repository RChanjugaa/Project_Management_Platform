name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: project_team_management_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci_user -d project_team_management_ci"
          --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: server
    env:
      NODE_ENV: test
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/project_team_management_ci?schema=public
      JWT_SECRET: ci-placeholder-secret-that-is-long-enough-for-validation
      JWT_EXPIRES_IN: 24h
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run type-check
      - run: npm run test
      - run: npm run build
