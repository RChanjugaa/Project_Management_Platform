name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      NODE_ENV: test
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: mysql://ci_user:ci_password@localhost:3306/project_team_management_ci
      JWT_SECRET: ci-placeholder-secret-that-is-long-enough-for-validation
      JWT_EXPIRES_IN: 24h
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run type-check
      - run: npm run test
      - run: npm run build
